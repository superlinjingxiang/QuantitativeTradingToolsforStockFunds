<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>中国股票与基金量化分析平台</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <input id="searchInput" class="search-input" placeholder="代码 / 名称" autocomplete="off" />
        <select id="strategyMode" class="control">
          <option value="short_term">短线策略</option>
          <option value="long_term">长线策略</option>
        </select>
        <select id="maxTrades" class="control">
          <option value="4">4 次</option>
          <option value="6">6 次</option>
          <option value="8">8 次</option>
          <option value="10">10 次</option>
          <option value="12" selected>12 次</option>
          <option value="20">20 次</option>
          <option value="30">30 次</option>
        </select>
        <select id="themeMode" class="control">
          <option>黑色主题</option>
        </select>
        <button id="chartBacktestButton" class="primary-button" type="button">回测曲线</button>
        <div id="healthBanner" class="health healthy">数据健康：等待行情</div>
        <div id="marketTime" class="market-time">行情时间：--</div>
      </header>

      <main class="workspace">
        <aside class="left-rail">
          <section class="panel small">
            <div class="panel-title">自选列表</div>
            <div class="watch-actions">
              <button type="button">✓</button>
              <button type="button">🗑</button>
            </div>
            <div id="watchlist" class="list-box"></div>
          </section>
          <section class="panel">
            <div class="panel-title">指数</div>
            <button id="refreshButton" class="icon-button" type="button">↻</button>
            <div id="marketOverview" class="market-overview"></div>
          </section>
          <section class="panel small">
            <div class="panel-title">最近访问</div>
            <div id="recentList" class="list-box"></div>
          </section>
        </aside>

        <section class="center-stage">
          <div class="chart-controls">
            <select id="intervalSelect" class="control">
              <option value="1d" selected>日线</option>
              <option value="30m">30分</option>
              <option value="60m">60分</option>
              <option value="1w">周线</option>
            </select>
            <select id="rangeSelect" class="control">
              <option value="5d">5日</option>
              <option value="1m" selected>1月</option>
              <option value="3m">3月</option>
              <option value="6m">6月</option>
              <option value="1y">1年</option>
            </select>
            <select id="adjustmentSelect" class="control">
              <option value="NONE" selected>不复权</option>
              <option value="FORWARD">前复权</option>
              <option value="BACKWARD">后复权</option>
            </select>
            <label class="toggle"><input id="volumeToggle" type="checkbox" checked />成交量</label>
            <label class="toggle"><input id="maToggle" type="checkbox" />MA</label>
            <label class="toggle"><input id="signalToggle" type="checkbox" />回测信号</label>
            <label class="toggle"><input id="forecastToggle" type="checkbox" />预测区间</label>
          </div>
          <div class="chart-card">
            <canvas id="priceChart"></canvas>
            <div id="chartEmpty" class="empty-state">暂无图表数据</div>
          </div>
          <div id="chartMeta" class="chart-meta">周期：1d | 复权：NONE | 范围：1m | 点数：0</div>
        </section>

        <aside class="right-rail">
          <section class="decision-card">
            <div class="panel-title">当前策略</div>
            <div id="strategyPanel" class="rich-panel"></div>
          </section>
          <section class="decision-card">
            <div class="panel-title">预期走势</div>
            <div id="forecastPanel" class="rich-panel"></div>
          </section>
          <section class="decision-card">
            <div class="panel-title">操作与风险</div>
            <div id="operationPanel" class="rich-panel"></div>
          </section>
          <section class="decision-card">
            <div class="panel-title">决策证据</div>
            <div id="decisionPanel" class="rich-panel"></div>
          </section>
        </aside>
      </main>

      <footer class="bottom-dock">
        <nav class="tabs">
          <button class="tab active" data-tab="market" type="button">市场</button>
          <button class="tab" data-tab="strategy" type="button">策略</button>
          <button class="tab" data-tab="backtest" type="button">回测</button>
          <button class="tab" data-tab="paper" type="button">模拟账户</button>
          <button class="tab" data-tab="risk" type="button">风险</button>
          <button class="tab" data-tab="knowledge" type="button">知识中心</button>
        </nav>
        <section class="backtest-panel">
          <div class="dock-head">
            <strong>盈利验证回测</strong>
            <button id="rerunButton" class="secondary-button" type="button">重新回测</button>
          </div>
          <div class="dock-grid">
            <article>
              <h3>摘要</h3>
              <div id="backtestSummary" class="text-box"></div>
            </article>
            <article>
              <h3>指标</h3>
              <div id="backtestMetrics" class="text-box"></div>
            </article>
            <article>
              <h3>证据</h3>
              <div id="backtestEvidence" class="text-box"></div>
            </article>
          </div>
        </section>
        <div id="statusBar" class="status-bar">状态：IDLE | 任务：IDLE | 标的：--</div>
      </footer>
    </div>
    <script src="./renderer.js"></script>
  </body>
</html>
