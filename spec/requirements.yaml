  title: 信号与运行审计追踪
non_functional_requirements:
- id: NFR-01
  text: 在约定夹具和硬件上，本地搜索P95小于300毫秒。
- id: NFR-02
  text: 缓存图表首次绘制目标不超过1秒。
- id: NFR-03
  text: Qt主线程不得出现超过100毫秒的阻塞操作。
- id: NFR-04
  text: 实时断线必须可见，并采用有上限的退避重连。
- id: NFR-05
  text: 长时间回测必须显示进度并支持取消。
- id: NFR-06
  text: 后台任务可取消、可安全重试并保持幂等。
- id: NFR-07
  text: 异常退出后可恢复用户状态和模拟组合。
- id: NFR-08
  text: 可通过版本、快照、配置和随机种子复现结果。
acceptance_criteria:
- id: AC-01
  text: 有效代码或名称返回正确候选并完成选择。
- id: AC-02
  text: 所有面板共享同一证券和同一时点上下文。
- id: AC-03
  text: 图表支持要求的交互、标记和预测区间。
- id: AC-04
  text: 策略身份、逻辑、适用条件和失效条件可见。
- id: AC-05
  text: 预测使用概率表达且不包含保证收益措辞。
- id: AC-06
  text: 非法或陈旧数据以明确原因阻止新信号。
- id: AC-07
  text: 不存在已知未来数据泄漏，成交时序可复现。
- id: AC-08
  text: 执行模型覆盖成本、流动性、涨跌停、停牌、可卖数量和生效日期。
- id: AC-09
  text: 相同输入和版本可复现完全相同结果。
- id: AC-10
  text: 每个信号具有完整来源和解释。
- id: AC-11
  text: 不得混用A股、场内基金和场外基金语义。
- id: AC-12
  text: 生产状态必须先通过最终样本外和模拟交易门槛。
source_documents:
