version: '1.0'
as_of: '2026-06-28'
project: china_quant_platform
mission: 构建面向中国股票与基金的桌面量化分析平台，提供可搜索行情、可解释策略分析、真实约束回测、风险控制和模拟交易。
constraints:
- id: C-001
  text: 不得宣称保证盈利；ABSTAIN（不交易）是合法结果。
- id: C-002
  text: 国际通用金融理论用于提出假设；中国市场规则用于约束执行。
- id: C-003
  text: MVP不得提交真实订单。
- id: C-004
  text: 回测必须使用时点数据，并建模按日期生效的规则与成本。
- id: C-005
  text: 陈旧、非法、缺失、未授权或分布外输入必须阻止新的交易信号。
