- id: FR-001
  priority: P0
  title: 证券搜索
- id: FR-002
  priority: P0
  title: 原子化证券切换
- id: FR-003
  priority: P0
  title: 历史行情图表
- id: FR-004
  priority: P0
  title: 实时行情
- id: FR-005
  priority: P0
  title: 图表叠加层与信号标记
- id: FR-006
  priority: P0
  title: 当前策略展示
- id: FR-007
  priority: P0
  title: 概率化预期走势
- id: FR-008
  priority: P0
  title: 包含ABSTAIN的操作信号
- id: FR-009
  priority: P0
  title: 解释与失效条件
- id: FR-010
  priority: P0
  title: 市场概览
- id: FR-011
